            [t.sme_s3_title, t.sme_s3_desc, t.sme_s3_tag],
            [t.sme_s4_title, t.sme_s4_desc, t.sme_s4_tag],
            [t.sme_s5_title, t.sme_s5_desc, t.sme_s5_tag],
            [t.sme_s6_title, t.sme_s6_desc, t.sme_s6_tag],
            [t.sme_s7_title, t.sme_s7_desc, t.sme_s7_tag],
            [t.sme_s8_title, t.sme_s8_desc, t.sme_s8_tag],
          ].map(([title, desc, tag], i) => (
            <div key={i} className="sme-service-card reveal">
              <div className="sme-service-num">0{i+1}</div>
              <h3 className="sme-service-title">{title}</h3>
              <p className="sme-service-desc">{desc}</p>
              <span className="sme-service-tag">{tag}</span>
            </div>
          ))}
        </div>
      </section>

      {/* INSIGHTS & STATS */}
      <section className="sme-insights-section">
        <div className="reveal">
          <div className="section-label">{t.sme_insight_label}</div>
          <h2 className="section-title" style={{marginTop:'1rem',maxWidth:'640px'}}>{t.sme_insight_title}</h2>
          <p style={{marginTop:'1rem',color:'var(--grey-300)',fontSize:'0.92rem',lineHeight:'1.8',maxWidth:'640px'}}>{t.sme_insight_sub}</p>
        </div>
        <div className="sme-stat-grid reveal">
          {[
            [t.sme_stat1_num, t.sme_stat1_label],
            [t.sme_stat2_num, t.sme_stat2_label],
            [t.sme_stat3_num, t.sme_stat3_label],
            [t.sme_stat4_num, t.sme_stat4_label],
          ].map(([num, label], i) => (
            <div key={i} className="sme-stat-item">
              <div className="sme-stat-num">{num}</div>
              <div className="sme-stat-label">{label}</div>
            </div>
          ))}
        </div>
        <div className="reveal">
          <div className="sme-markets-label">{t.sme_markets_label}</div>
          <div className="sme-market-grid">
            {(t.sme_markets || []).map((m, i) => (
              <div key={i} className="sme-market-card">
                <div className="sme-market-flag">{m.flag}</div>
                <div className="sme-market-country">{m.country}</div>
                <div className="sme-market-stat">{m.stat}</div>
                <p className="sme-market-insight">{m.insight}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* THE VERTEX DIFFERENCE */}
      <section className="sme-difference-section">
        <div className="sme-difference-inner">
          <div className="reveal">
            <div className="section-label">{t.sme_not_for_label}</div>
            <h2 className="section-title" style={{marginTop:'1rem'}}>{t.sme_not_for_title}</h2>
            <div className="sme-difference-text">
              <p>{t.sme_not_for_p1}</p>
              <p>{t.sme_not_for_p2}</p>
              <p style={{fontStyle:'italic',color:'var(--white)',borderLeft:'3px solid var(--accent)',paddingLeft:'1.2rem',marginTop:'1.5rem'}}>{t.sme_not_for_p3}</p>
            </div>
          </div>
          <div className="reveal">
            <div className="sme-pillars-grid">
              {(t.sme_pillars || []).map((p, i) => (
                <div key={i} className="sme-pillar-card">
                  <div className="sme-pillar-icon">{p.icon}</div>
                  <div className="sme-pillar-title">{p.title}</div>
                  <p className="sme-pillar-desc">{p.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* CTA */}
      <section className="sme-cta-section">
        <div className="sme-cta-inner reveal">
          <h2 className="sme-cta-title">{t.sme_cta_title}</h2>
          <p className="sme-cta-sub">{t.sme_cta_sub}</p>
          <div className="sme-cta-actions">
            <button className="btn-primary" onClick={() => { setPage('diagnosis'); window.scrollTo(0,0); }}>{t.sme_cta_btn}</button>
            <button className="btn-ghost" onClick={() => { setPage('contact'); window.scrollTo(0,0); }}>{t.sme_cta_ghost}</button>
          </div>
        </div>
      </section>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [report, setReport] = useState(null);
  const [lang, setLang] = useState('en');
  const [detectedLang, setDetectedLang] = useState(null);
  const [detectedCountry, setDetectedCountry] = useState(null);
  const [langNoticeDismissed, setLangNoticeDismissed] = useState(false);

  const t = lang === 'fr' ? T.fr : T.en;

  useEffect(() => {
    detectLanguage().then(({ lang: dl, country }) => {
      setDetectedLang(dl);
      setDetectedCountry(country);
    });
  }, []);

  const handleLangSwitch = () => {
    setLang(detectedLang);
    setLangNoticeDismissed(true);
  };

  const go = (p) => { setPage(p); window.scrollTo(0,0); };

  const pages = {
    home: <HomePage setPage={setPage} t={t}/>,
    services: <ServicesPage setPage={setPage} t={t}/>,
    sme: <SMEPage setPage={setPage} t={t}/>,
    success: <SuccessPage setPage={setPage} t={t}/>,
    plans: <PlansPage setPage={setPage} t={t}/>,
    diagnosis: <DiagnosisPage setPage={setPage} setReport={setReport} t={t}/>,
    report: <ReportPage report={report} setPage={setPage} t={t}/>,
    contact: <ContactPage t={t}/>,
  };

  const isFr = lang === 'fr';

  return (
    <div>
      <Nav page={page} setPage={setPage} lang={lang} setLang={setLang} t={t}/>
      {pages[page] || pages['home']}

      {/* NEWSLETTER */}
      <NewsletterSection t={t}/>

      {/* FOOTER */}
      <footer className="footer">
        <div className="footer-main">
          {/* Brand column */}
          <div className="footer-brand">
            <div className="footer-brand-logo" onClick={() => go('home')}>
              <Logo size={52} style={{opacity:0.92,borderRadius:0,height:'52px',width:'auto',maxWidth:'170px',objectFit:'contain'}}/>
            </div>
            <p className="footer-brand-desc">
              {isFr
                ? 'Cabinet de conseil stratégique qui accompagne les PME africaines vers une croissance durable et mesurable.'
                : 'Strategic consulting firm empowering African SMEs to achieve structured, measurable, lasting growth.'}
            </p>
            {/* Social in footer too */}
            <div style={{display:'flex',gap:'0.6rem',marginBottom:'1.5rem'}}>
              <a href="https://www.instagram.com/vertexgroup.africa" target="_blank" rel="noopener noreferrer"
                style={{display:'flex',alignItems:'center',justifyContent:'center',width:34,height:34,border:'1px solid var(--grey-700)',color:'var(--grey-500)',transition:'all 0.2s',textDecoration:'none'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--cta)';e.currentTarget.style.color='var(--cta)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--grey-700)';e.currentTarget.style.color='var(--grey-500)'}}>
                <IconInstagram/>
              </a>
              <a href="https://www.linkedin.com/company/vertexgroup-africa" target="_blank" rel="noopener noreferrer"
                style={{display:'flex',alignItems:'center',justifyContent:'center',width:34,height:34,border:'1px solid var(--grey-700)',color:'var(--grey-500)',transition:'all 0.2s',textDecoration:'none'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--cta)';e.currentTarget.style.color='var(--cta)'}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--grey-700)';e.currentTarget.style.color='var(--grey-500)'}}>
                <IconLinkedIn/>
              </a>
            </div>
            <div className="footer-address">
              <strong>{isFr ? 'Adresse' : 'Address'}</strong>
              155 West St, Sandown<br/>
              WeWork Building, 2196<br/>
              Johannesburg, South Africa
            </div>
          </div>

          {/* Nav column */}
          <div>
            <div className="footer-col-title">{isFr ? 'Navigation' : 'Navigation'}</div>
            <ul className="footer-col-links">
              {[['home',t.nav_about],['services',t.nav_services],['sme',t.nav_sme],['success',t.nav_results],['plans',t.nav_plans],['diagnosis',t.nav_diagnosis],['contact',t.nav_contact]].map(([p,l]) => (
                <li key={p}><button onClick={() => go(p)}>{l}</button></li>
              ))}
              <li><button onClick={() => window.open('/events.html','_blank')} style={{color:'var(--accent)'}}>{t.nav_events}</button></li>
            </ul>
          </div>

          {/* Services column */}
          <div>
            <div className="footer-col-title">{isFr ? 'Services' : 'Services'}</div>
            <ul className="footer-col-links">
              {[t.svc1_title, t.svc2_title, t.svc3_title, t.svc4_title].map(s => (
                <li key={s}><button onClick={() => go('services')}>{s}</button></li>
              ))}
            </ul>
          </div>

          {/* Contact column */}
          <div>
            <div className="footer-col-title">{isFr ? 'Contact' : 'Contact'}</div>
            <ul className="footer-col-links">
              <li><button onClick={() => go('contact')} style={{color:'var(--grey-500)'}}>info@vertexgroup.africa</button></li>
              <li><button onClick={() => go('contact')} style={{color:'var(--grey-500)'}}>vertexgroup.africa</button></li>
              <li style={{marginTop:'0.8rem'}}>
                <button onClick={() => go('diagnosis')}
                  style={{background:'var(--cta)',color:'var(--white)',border:'none',padding:'0.6rem 1rem',fontSize:'0.7rem',letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:500,cursor:'pointer',transition:'background 0.2s'}}>
                  {isFr ? 'Diagnostic gratuit' : 'Free Diagnosis'}
                </button>
              </li>
            </ul>
          </div>
        </div>

        <div className="footer-bottom">
          <div className="footer-copy">© 2025 Vertex Group · 155 West St, Sandown, Johannesburg · {CONTACT_EMAIL} · {SITE_DOMAIN}</div>
          <div className="footer-legal">
            <span>{isFr ? 'Tous droits réservés' : 'All rights reserved'}</span>
            <span>·</span>
            <span>{isFr ? 'Politique de confidentialité' : 'Privacy Policy'}</span>
          </div>
        </div>
      </footer>

      {detectedLang && detectedLang !== lang && !langNoticeDismissed && (
        <LangNotice
          detectedLang={detectedLang}
          currentLang={lang}
          t={t}
          onSwitch={handleLangSwitch}
          onDismiss={() => setLangNoticeDismissed(true)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
