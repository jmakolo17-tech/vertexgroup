<style>
:root{
  --black:#0a0a0a;--offblack:#0f0f0d;--white:#f5f4f0;--cream:#ece9e2;
  --grey-100:#e8e7e3;--grey-300:#b8b7b3;--grey-500:#787774;--grey-700:#3a3a38;--grey-800:#222220;
  --accent:#c8b89a;--accent-dark:#9a8870;--accent-light:#e8ddd0;
  --cta:#0c94d8;--cta-hover:#0a7fbf;--cta-glow:rgba(12,148,216,0.25);
  --rule:1px solid rgba(255,255,255,0.08);--rule-light:1px solid rgba(0,0,0,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--offblack)}::-webkit-scrollbar-thumb{background:var(--grey-700)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;border-bottom:var(--rule);background:rgba(10,10,10,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.nav-logo{display:flex;align-items:center;cursor:pointer}
.nav-logo img{height:68px;width:auto;max-width:220px;object-fit:contain;border-radius:0;transition:opacity 0.2s}
.nav-logo:hover img{opacity:0.85}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links button{background:none;border:none;color:var(--grey-300);font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:400;transition:color 0.2s;padding:0}
.nav-links button:hover,.nav-links button.active{color:var(--white)}
.nav-cta{background:var(--cta)!important;color:var(--white)!important;padding:0.55rem 1.2rem!important;font-size:0.68rem!important;transition:background 0.2s!important}
.nav-cta:hover{background:var(--cta-hover)!important}
.nav-right{display:flex;align-items:center;gap:1.5rem}

/* LANGUAGE SWITCHER */
.lang-switcher{display:flex;align-items:center;gap:0;border:1px solid var(--grey-700);overflow:hidden}
.lang-btn{background:none;border:none;color:var(--grey-500);font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.4rem 0.7rem;transition:all 0.2s;font-family:'DM Mono',monospace}
.lang-btn.active{background:var(--accent);color:var(--black);font-weight:500}
.lang-btn:hover:not(.active){color:var(--white)}
.lang-divider{width:1px;height:100%;background:var(--grey-700)}

/* HAMBURGER */
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:4px}
.nav-hamburger span{width:20px;height:1px;background:var(--white);display:block;transition:all 0.3s}
.mobile-menu{display:none;position:fixed;inset:0;z-index:199;background:rgba(10,10,10,0.98);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.mobile-menu.open{display:flex}
.mobile-menu button{background:none;border:none;color:var(--white);font-size:1.4rem;font-family:'Playfair Display',serif;font-weight:600;letter-spacing:0.05em;padding:0.5rem}
.mobile-lang{display:flex;gap:1rem;margin-top:1rem}
.mobile-lang button{background:none;border:1px solid var(--grey-700);color:var(--grey-300);font-size:0.8rem;padding:0.5rem 1.2rem;font-family:'DM Mono',monospace;letter-spacing:0.1em;text-transform:uppercase}
.mobile-lang button.active{background:var(--accent);border-color:var(--accent);color:var(--black)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:8rem 3rem 5rem;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 65% 65% at 72% 38%,rgba(200,184,154,0.08) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 18% 82%,rgba(200,184,154,0.04) 0%,transparent 60%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:80px 80px}
.hero-label{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:2rem;animation:fadeUp 0.8s 0.3s both}
.hero-h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,7.5vw,8rem);font-weight:900;line-height:0.96;letter-spacing:-0.025em;max-width:950px;animation:fadeUp 0.9s 0.5s both}
.hero-h1 em{font-style:italic;color:var(--accent)}
.hero-sub{margin-top:2.5rem;font-size:1.05rem;color:var(--grey-300);max-width:520px;line-height:1.75;animation:fadeUp 0.9s 0.7s both}
.hero-actions{margin-top:3rem;display:flex;gap:1.2rem;align-items:center;flex-wrap:wrap;animation:fadeUp 0.9s 0.9s both}
.btn-primary{background:var(--cta);color:var(--white);padding:1rem 2.2rem;font-size:0.78rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;border:none;transition:background 0.25s,transform 0.2s,box-shadow 0.2s;cursor:pointer;box-shadow:0 0 0 0 var(--cta-glow)}
.btn-primary:hover{background:var(--cta-hover);transform:translateY(-2px);box-shadow:0 8px 24px var(--cta-glow)}
.btn-ghost{color:var(--grey-300);font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;border:none;border-bottom:1px solid var(--grey-700);padding-bottom:2px;background:none;transition:color 0.2s,border-color 0.2s;cursor:pointer}
.btn-ghost:hover{color:var(--white);border-color:var(--grey-300)}
.hero-scroll-indicator{position:absolute;bottom:2.5rem;right:3rem;display:flex;flex-direction:column;align-items:center;gap:0.6rem;animation:fadeUp 0.9s 1.2s both}
.hero-scroll-indicator span{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey-500);writing-mode:vertical-rl}
.scroll-line{width:1px;height:60px;background:linear-gradient(to bottom,var(--grey-700),transparent);animation:scrollPulse 2s infinite}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border-top:var(--rule);border-bottom:var(--rule)}
.stat-item{padding:2.5rem 2.5rem;border-right:var(--rule)}
.stat-item:last-child{border-right:none}
.stat-number{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;line-height:1;letter-spacing:-0.03em}
.stat-label{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--grey-500);margin-top:0.5rem;font-weight:400}

/* SECTIONS */
.section{padding:7rem 3rem}
.section-label{font-family:'DM Mono',monospace;font-size:0.64rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem}
.section-label::after{content:'';height:1px;width:40px;background:var(--accent);opacity:0.5}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:900;line-height:1.05;letter-spacing:-0.02em}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center}
.about-text p{color:var(--grey-300);margin-top:1.5rem;font-size:0.95rem;line-height:1.82}
.about-text p strong{color:var(--white);font-weight:500}
.about-philosophy{margin-top:2.5rem;padding:2rem;border-left:3px solid var(--accent);background:rgba(200,184,154,0.06)}
.about-philosophy p{font-family:'Playfair Display',serif;font-size:1.35rem;font-style:italic;color:var(--white);line-height:1.5}
.africa-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1.5rem}
.africa-tag{padding:0.35rem 0.8rem;border:1px solid var(--grey-700);font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey-300)}
.about-visual{background:linear-gradient(135deg,#1a1a18,#0a0a0a);aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.about-visual-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(200,184,154,0.12),transparent 65%)}
.about-visual-logo{width:72%;height:auto;object-fit:contain;z-index:1;opacity:0.85;border-radius:8px}
.about-visual-tag{position:absolute;bottom:2rem;left:2rem;font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase}

/* SERVICES */
.services-section{background:var(--offblack)}
.services-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4rem;gap:2rem;flex-wrap:wrap}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--grey-700);border:1px solid var(--grey-700)}
.service-card{background:var(--offblack);padding:3rem;position:relative;overflow:hidden;transition:background 0.3s;cursor:default}
.service-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--accent);transition:width 0.4s}
.service-card:hover{background:#131311}
.service-card:hover::before{width:100%}
.service-num{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--grey-500);letter-spacing:0.15em;margin-bottom:2rem}
.service-icon{width:42px;height:42px;border:1px solid var(--grey-700);display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;font-size:1rem;transition:border-color 0.3s}
.service-card:hover .service-icon{border-color:var(--accent)}
.service-title{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:600;margin-bottom:1rem;line-height:1.2}
.service-desc{color:var(--grey-300);font-size:0.87rem;line-height:1.8}
.service-outcomes{margin-top:1.5rem;display:flex;flex-direction:column;gap:0.4rem}
.service-outcome{font-size:0.72rem;color:var(--grey-500);display:flex;align-items:center;gap:0.6rem;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.service-outcome::before{content:'→';color:var(--accent);font-size:0.68rem}

/* FORM */
.form-panel{background:var(--offblack);border:1px solid var(--grey-700);border-top:3px solid var(--cta);padding:2.5rem}
.form-title{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:700;margin-bottom:0.4rem;line-height:1.25}
.form-subtitle{font-size:0.75rem;color:var(--grey-500);font-family:'DM Mono',monospace;letter-spacing:0.06em;margin-bottom:2rem;line-height:1.5}
.form-section-label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--cta);border-bottom:1px solid var(--grey-700);padding-bottom:0.65rem;margin:1.8rem 0 1.25rem;display:flex;align-items:center;gap:0.7rem}
.form-section-label::before{content:'';display:inline-block;width:5px;height:5px;background:var(--cta);border-radius:50%;flex-shrink:0}
.form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem}
.form-group label{font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--grey-500);font-family:'DM Mono',monospace}
.form-group input,.form-group select,.form-group textarea{background:var(--grey-800);border:1px solid var(--grey-700);color:var(--white);padding:0.8rem 1rem;font-size:0.88rem;font-weight:300;outline:none;transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;width:100%;box-sizing:border-box}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cta);background:rgba(12,148,216,0.04);box-shadow:0 0 0 3px rgba(12,148,216,0.07)}
.form-group select option{background:#1a1a18;color:var(--white)}
.form-group textarea{resize:none;min-height:90px}
.file-zone{border:1px dashed var(--grey-700);padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;margin-bottom:1.3rem;background:var(--grey-800)}
.file-zone:hover,.file-zone.dragover{border-color:var(--cta);border-style:solid;background:rgba(12,148,216,0.05)}
.file-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-zone-text{pointer-events:none}
.file-zone-icon{font-size:1.3rem;margin-bottom:0.5rem;display:block;color:var(--cta)}
.file-zone-main{font-size:0.82rem;color:var(--grey-300);font-weight:500;margin-bottom:0.2rem}
.file-zone-sub{font-size:0.7rem;color:var(--grey-500);font-family:'DM Mono',monospace;letter-spacing:0.06em}
.form-submit{width:100%;background:var(--cta);color:var(--white);border:none;padding:1.15rem 2rem;font-size:0.78rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:background 0.25s,transform 0.2s,box-shadow 0.2s;margin-top:0.75rem}
.form-submit:hover:not(:disabled){background:var(--cta-hover);transform:translateY(-2px);box-shadow:0 8px 28px var(--cta-glow)}
.form-submit:disabled{opacity:0.45;cursor:not-allowed}
.form-error{color:#e07070;font-size:0.72rem;font-family:'DM Mono',monospace;margin-top:0.25rem}
.diag-step-item{display:flex;gap:1.5rem;padding:1.5rem 0;border-bottom:var(--rule)}
.diag-step-item:first-child{padding-top:0}
.diag-step-item:last-child{border-bottom:none}
.diag-step-num-wrap{display:flex;flex-direction:column;align-items:center;gap:0;min-width:28px}
.diag-step-num{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--cta);letter-spacing:0.15em;background:rgba(12,148,216,0.1);border:1px solid rgba(12,148,216,0.25);width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.diag-step-title{font-size:0.88rem;font-weight:500;margin-bottom:0.3rem;color:var(--white)}
.diag-step-desc{font-size:0.78rem;color:var(--grey-500);line-height:1.65}
.diag-stats-row{display:flex;gap:0;border:var(--rule);margin-top:2rem}
.diag-stat{flex:1;padding:1.2rem 1.5rem;border-right:var(--rule);display:flex;flex-direction:column;gap:0.3rem}
.diag-stat:last-child{border-right:none}
.diag-stat-num{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--white);line-height:1}
.diag-stat-lbl{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--grey-500)}

/* PROCESSING */
.processing-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.98);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.8rem;padding:2rem}
.processing-logo{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.5rem}
.processing-logo-text{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;letter-spacing:0.08em;color:var(--white)}
.processing-ring{width:68px;height:68px;border:2px solid rgba(12,148,216,0.15);border-top-color:var(--cta);border-radius:50%;animation:spin 0.9s linear infinite}
.processing-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;text-align:center;line-height:1.2}
.processing-timer{font-family:'DM Mono',monospace;font-size:2.4rem;color:var(--cta);letter-spacing:0.12em}
.processing-steps{display:flex;flex-direction:column;gap:0.55rem;max-width:420px;width:100%}
.proc-step{display:flex;align-items:center;gap:1rem;font-size:0.77rem;color:var(--grey-700);transition:color 0.3s,opacity 0.3s}
.proc-step.done{color:var(--grey-500)}
.proc-step.active{color:var(--white)}
.proc-step-dot{width:6px;height:6px;border-radius:50%;background:var(--grey-700);flex-shrink:0;transition:background 0.3s,box-shadow 0.3s}
.proc-step.done .proc-step-dot{background:var(--cta);opacity:0.5}
.proc-step.active .proc-step-dot{background:var(--cta);box-shadow:0 0 10px var(--cta)}
.proc-progress-wrap{width:420px;max-width:90vw;height:1px;background:var(--grey-700);position:relative;overflow:hidden}
.proc-progress-fill{position:absolute;left:0;top:0;height:100%;background:var(--cta);transition:width 1.8s ease;box-shadow:0 0 8px var(--cta)}

/* REPORT */
.report-page{min-height:100vh;padding-top:80px;background:var(--black)}
.report-hero{padding:4rem 3rem;border-bottom:var(--rule);background:linear-gradient(180deg,rgba(12,148,216,0.05) 0%,transparent 100%)}
.report-meta{display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:1.5rem}
.report-meta-item{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;color:var(--grey-500);text-transform:uppercase;display:flex;gap:0.5rem;align-items:center}
.report-meta-item span{color:var(--accent)}
.report-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:900;margin-bottom:1rem;line-height:1.1}
.report-email-notice{display:flex;align-items:center;gap:0.8rem;background:rgba(12,148,216,0.06);border:1px solid rgba(12,148,216,0.2);padding:1rem 1.5rem;margin-top:1.5rem;font-size:0.83rem;color:var(--grey-300)}
.report-email-notice strong{color:var(--cta)}
.report-body{padding:3rem;display:grid;grid-template-columns:2fr 1fr;gap:3rem;align-items:start}
.report-main{display:flex;flex-direction:column;gap:2rem}
.report-section{border:1px solid var(--grey-700);overflow:hidden}
.report-section-header{padding:1.5rem 2rem;border-bottom:1px solid var(--grey-700);display:flex;align-items:center;gap:1rem;background:var(--offblack)}
.report-section-icon{font-size:1.1rem}
.report-section-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600}
.report-section-tag{margin-left:auto;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.25rem 0.6rem;border:1px solid;flex-shrink:0}
.tag-critical{color:#e07070;border-color:#e07070;background:rgba(224,112,112,0.08)}
.tag-medium{color:var(--accent);border-color:var(--accent);background:rgba(200,184,154,0.08)}
.tag-strong{color:#7ab5a0;border-color:#7ab5a0;background:rgba(122,181,160,0.08)}
.report-section-body{padding:2rem}
.report-section-body p{font-size:0.88rem;color:var(--grey-300);line-height:1.82;margin-bottom:1rem}
.report-section-body p:last-child{margin-bottom:0}
.report-bullets{display:flex;flex-direction:column;gap:0.7rem;margin-top:1rem}
.report-bullet{display:flex;gap:0.8rem;align-items:flex-start;font-size:0.84rem;color:var(--grey-300);line-height:1.6}
.report-bullet::before{content:'→';color:var(--accent);font-size:0.72rem;flex-shrink:0;margin-top:3px}
.score-bar-wrap{margin-top:0.8rem}
.score-label{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--grey-500);font-family:'DM Mono',monospace;margin-bottom:0.4rem}
.score-bar{height:3px;background:var(--grey-700);position:relative;overflow:hidden}
.score-fill{height:100%;background:var(--accent);transition:width 1s 0.3s}
.report-sidebar{display:flex;flex-direction:column;gap:1.5rem;position:sticky;top:100px}
.sidebar-card{border:1px solid var(--grey-700);padding:1.8rem}
.sidebar-card-title{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:1.2rem}
.overall-score{font-family:'Playfair Display',serif;font-size:4rem;font-weight:900;line-height:1;margin-bottom:0.3rem}
.overall-score-label{font-size:0.72rem;color:var(--grey-500);letter-spacing:0.1em;text-transform:uppercase}
.score-breakdown{display:flex;flex-direction:column;gap:0.8rem;margin-top:1.2rem}
.priority-list{display:flex;flex-direction:column;gap:0.7rem}
.priority-item{display:flex;gap:0.8rem;align-items:flex-start}
.priority-num{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--accent);min-width:20px;margin-top:2px}
.priority-text{font-size:0.8rem;color:var(--grey-300);line-height:1.5}
.cta-card{background:var(--white);color:var(--black);padding:2rem}
.cta-card-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:0.8rem;line-height:1.3}
.cta-card-desc{font-size:0.8rem;color:var(--grey-700);line-height:1.6;margin-bottom:1.5rem}
.cta-card-btn{width:100%;background:var(--cta);color:var(--white);border:none;padding:0.9rem;font-size:0.75rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s,box-shadow 0.2s}
.cta-card-btn:hover{background:var(--cta-hover);box-shadow:0 4px 16px var(--cta-glow)}
.print-actions{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap}
.print-btn{background:transparent;border:1px solid var(--grey-700);color:var(--grey-300);padding:0.7rem 1.2rem;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-family:'DM Mono',monospace}
.print-btn:hover{border-color:var(--accent);color:var(--accent)}

/* CASES */
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:4rem}
.case-card{border:1px solid var(--grey-700);padding:2.5rem;position:relative;overflow:hidden;transition:border-color 0.3s}
.case-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);transform:scaleX(0);transform-origin:left;transition:transform 0.4s}
.case-card:hover{border-color:var(--grey-500)}
.case-card:hover::after{transform:scaleX(1)}
.case-industry{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:1.2rem}
.case-metric{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;line-height:1;margin-bottom:0.3rem;letter-spacing:-0.02em}
.case-metric-label{font-size:0.7rem;color:var(--grey-500);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1.5rem}
.case-desc{font-size:0.85rem;color:var(--grey-300);line-height:1.78}
.case-country{margin-top:1.5rem;display:flex;align-items:center;gap:0.5rem;font-size:0.68rem;color:var(--grey-500);font-family:'DM Mono',monospace;letter-spacing:0.1em}
.case-country::before{content:'◎';color:var(--accent);font-size:0.58rem}
.testimonial-bar{margin-top:4rem;padding:3rem;border:1px solid var(--grey-700);display:grid;grid-template-columns:1fr auto;gap:3rem;align-items:center}
.testimonial-quote{font-family:'Playfair Display',serif;font-size:1.25rem;font-style:italic;line-height:1.55}
.testimonial-attr{text-align:right;min-width:160px}
.testimonial-name{font-size:0.8rem;font-weight:500;margin-bottom:0.2rem}
.testimonial-role{font-size:0.68rem;color:var(--grey-500);font-family:'DM Mono',monospace;letter-spacing:0.08em}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;padding:0}
.contact-left{background:var(--white);color:var(--black);padding:6rem 4rem;display:flex;flex-direction:column;justify-content:center}
.contact-left .section-label{color:var(--accent-dark)}
.contact-left .section-label::after{background:var(--accent-dark)}
.contact-details{margin-top:3rem;display:flex;flex-direction:column;gap:1.8rem}
.contact-detail-label{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey-500);margin-bottom:0.2rem}
.contact-detail-value{font-size:0.95rem;color:var(--black);font-weight:400;line-height:1.5}
.contact-right{background:var(--offblack);padding:6rem 4rem;display:flex;flex-direction:column;justify-content:center}
.contact-right .section-label{color:var(--accent)}

/* FOOTER */
.footer{background:#050505;padding:3rem;border-top:var(--rule);display:flex;justify-content:space-between;align-items:center;gap:2rem;flex-wrap:wrap}
.footer-logo{display:flex;align-items:center;gap:0.6rem}
.footer-logo img{height:36px;width:auto;max-width:120px;object-fit:contain;border-radius:4px;opacity:0.8;filter:brightness(1.8)}
.footer-logo-text{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600}
.footer-logo-text span{color:var(--accent)}
.footer-copy{font-size:0.68rem;color:var(--grey-500);font-family:'DM Mono',monospace;letter-spacing:0.08em}
.footer-links{display:flex;gap:2rem;list-style:none}
.footer-links button{background:none;border:none;color:var(--grey-500);font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:color 0.2s}
.footer-links button:hover{color:var(--white)}

/* NEWSLETTER SECTION */
.newsletter-section{background:#070706;border-top:var(--rule);border-bottom:var(--rule);padding:5rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
.newsletter-left .section-label{color:var(--cta)}
.newsletter-left .section-label::after{background:var(--cta);opacity:0.6}
.newsletter-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2.4rem);font-weight:900;line-height:1.1;letter-spacing:-0.02em;margin-bottom:1rem}
.newsletter-sub{font-size:0.88rem;color:var(--grey-300);line-height:1.75;max-width:400px}
.newsletter-form{display:flex;flex-direction:column;gap:1rem}
.newsletter-input-row{display:flex;gap:0}
.newsletter-input{flex:1;background:transparent;border:1px solid var(--grey-700);border-right:none;color:var(--white);padding:0.9rem 1.2rem;font-size:0.88rem;font-family:'DM Sans',sans-serif;font-weight:300;outline:none;transition:border-color 0.2s}
.newsletter-input:focus{border-color:var(--cta)}
.newsletter-input::placeholder{color:var(--grey-500)}
.newsletter-btn{background:var(--cta);color:var(--white);border:none;padding:0.9rem 1.6rem;font-size:0.75rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background 0.2s,box-shadow 0.2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.newsletter-btn:hover{background:var(--cta-hover);box-shadow:0 4px 20px var(--cta-glow)}
.newsletter-btn:disabled{opacity:0.5;cursor:not-allowed}
.newsletter-disclaimer{font-size:0.68rem;color:var(--grey-500);font-family:'DM Mono',monospace;letter-spacing:0.06em}
.newsletter-topics{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.8rem}
.newsletter-topic{padding:0.3rem 0.7rem;border:1px solid var(--grey-700);font-size:0.65rem;color:var(--grey-500);font-family:'DM Mono',monospace;letter-spacing:0.08em;text-transform:uppercase}
.newsletter-success{display:flex;align-items:center;gap:0.8rem;padding:1rem 1.2rem;background:rgba(12,148,216,0.08);border:1px solid rgba(12,148,216,0.3);font-size:0.84rem;color:var(--white)}
.newsletter-success-icon{font-size:1.2rem;flex-shrink:0}

/* SOCIAL ICONS */
.social-row{display:flex;gap:0.8rem;align-items:center;margin-top:1.5rem}
.social-btn{display:flex;align-items:center;gap:0.6rem;padding:0.55rem 1rem;border:1px solid var(--grey-700);background:transparent;color:var(--grey-300);font-size:0.72rem;font-family:'DM Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;text-decoration:none}
.social-btn:hover{border-color:var(--cta);color:var(--white);background:rgba(12,148,216,0.08)}
.social-btn svg{flex-shrink:0}

/* FOOTER — expanded */
.footer{background:#030303;padding:0;border-top:var(--rule)}
.footer-main{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;padding:4rem 3rem 3rem}
.footer-brand{}
.footer-brand-logo{display:flex;align-items:center;gap:0.7rem;margin-bottom:1.2rem;cursor:pointer}
.footer-brand-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600}
.footer-brand-text span{color:var(--accent)}
.footer-brand-desc{font-size:0.82rem;color:var(--grey-500);line-height:1.7;max-width:280px;margin-bottom:1.5rem}
.footer-address{font-size:0.75rem;color:var(--grey-500);font-family:'DM Mono',monospace;line-height:1.8;letter-spacing:0.04em}
.footer-address strong{color:var(--grey-300);display:block;margin-bottom:0.3rem;letter-spacing:0.1em;font-size:0.65rem;text-transform:uppercase}
.footer-col-title{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey-300);margin-bottom:1.2rem}
.footer-col-links{display:flex;flex-direction:column;gap:0.6rem;list-style:none}
.footer-col-links button{background:none;border:none;color:var(--grey-500);font-size:0.8rem;cursor:pointer;transition:color 0.2s;padding:0;text-align:left}
.footer-col-links button:hover{color:var(--white)}
.footer-bottom{border-top:var(--rule);padding:1.5rem 3rem;display:flex;justify-content:space-between;align-items:center;gap:2rem;flex-wrap:wrap}
.footer-copy{font-size:0.65rem;color:var(--grey-700);font-family:'DM Mono',monospace;letter-spacing:0.08em}
.footer-legal{display:flex;gap:1.5rem}
.footer-legal span{font-size:0.65rem;color:var(--grey-700);font-family:'DM Mono',monospace;letter-spacing:0.06em;cursor:default}

@media(max-width:768px){
  .nav-logo img{height:54px;max-width:170px}
}
@media(max-width:900px){
  .newsletter-section{grid-template-columns:1fr;gap:2.5rem;padding:4rem 1.5rem}
  .newsletter-input-row{flex-direction:column}
  .newsletter-input{border-right:1px solid var(--grey-700);border-bottom:none}
  .newsletter-btn{width:100%}
  .footer-main{grid-template-columns:1fr 1fr;gap:2rem;padding:3rem 1.5rem}
  .footer-bottom{flex-direction:column;text-align:center;padding:1.5rem}
}
/* PRICING PAGE */
.pricing-hero{padding:5rem 3rem 4rem;border-bottom:var(--rule);text-align:center}
.pricing-hero .section-label{justify-content:center}
.pricing-hero .section-title{margin:0 auto;max-width:700px}
.pricing-note{max-width:700px;margin:2rem auto 0;padding:1.5rem 2rem;border:1px solid rgba(200,184,154,0.25);background:rgba(200,184,154,0.04);text-align:left;display:flex;gap:1rem;align-items:flex-start}
.pricing-note-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
.pricing-note-text{font-size:0.84rem;color:var(--grey-300);line-height:1.78}
.pricing-note-text strong{color:var(--white);font-weight:500}
.plans-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grey-700);border:1px solid var(--grey-700);margin:4rem 3rem}
.plan-card{background:var(--offblack);padding:2.5rem;display:flex;flex-direction:column;position:relative;transition:background 0.3s}
.plan-card:hover{background:#121210}
.plan-card.featured{background:#0d1a24;border-top:3px solid var(--cta)}
.plan-card.featured:hover{background:#0f1e2a}
.plan-badge{position:absolute;top:-1px;left:0;right:0;background:var(--cta);color:var(--white);font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;padding:0.3rem 0;text-align:center;font-weight:500}
.plan-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;margin-bottom:0.4rem;line-height:1;margin-top:0.5rem}
.plan-name.featured-name{color:var(--cta)}
.plan-duration{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--grey-500);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:1.5rem}
.plan-price{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--white);margin-bottom:0.3rem;line-height:1}
.plan-price-note{font-size:0.72rem;color:var(--grey-500);font-family:'DM Mono',monospace;margin-bottom:1.5rem;letter-spacing:0.06em}
.plan-divider{height:1px;background:var(--grey-700);margin:1.5rem 0}
.plan-features{display:flex;flex-direction:column;gap:0.7rem;flex:1;margin-bottom:2rem}
.plan-feature{display:flex;align-items:flex-start;gap:0.7rem;font-size:0.82rem;color:var(--grey-300);line-height:1.5}
.plan-feature-icon{font-size:0.7rem;flex-shrink:0;margin-top:3px;color:var(--accent)}
.plan-feature-icon.cta-color{color:var(--cta)}
.plan-feature.highlight{color:var(--white)}
.plan-cta{width:100%;padding:0.9rem;font-size:0.75rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;border:none}
.plan-cta-outline{background:transparent;border:1px solid var(--grey-700)!important;color:var(--grey-300)}
.plan-cta-outline:hover{border-color:var(--cta)!important;color:var(--white);background:rgba(12,148,216,0.06)}
.plan-cta-solid{background:var(--cta);color:var(--white)}
.plan-cta-solid:hover{background:var(--cta-hover);box-shadow:0 6px 20px var(--cta-glow)}
.plan-cta-custom{background:transparent;border:1px solid var(--accent)!important;color:var(--accent)}
.plan-cta-custom:hover{background:rgba(200,184,154,0.08);color:var(--white)}
/* QUOTE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(5,5,5,0.92);z-index:400;display:flex;align-items:center;justify-content:center;padding:1.5rem;backdrop-filter:blur(8px)}
.modal-box{background:var(--offblack);border:1px solid var(--grey-700);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;position:relative;animation:fadeUp 0.35s both}
.modal-header{padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--grey-700);display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;position:sticky;top:0;background:var(--offblack);z-index:1}
.modal-plan-tag{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--cta);margin-bottom:0.5rem}
.modal-title{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:700;line-height:1.2}
.modal-close{background:none;border:none;color:var(--grey-500);font-size:1.1rem;cursor:pointer;padding:0;flex-shrink:0;margin-top:2px}
.modal-close:hover{color:var(--white)}
.modal-body{padding:1.5rem 2.5rem}
.modal-plan-summary{background:rgba(12,148,216,0.06);border:1px solid rgba(12,148,216,0.18);padding:1.2rem;margin-bottom:1.8rem;font-size:0.82rem;color:var(--grey-300);line-height:1.75}
.modal-plan-summary strong{color:var(--white);display:block;margin-bottom:0.5rem;font-size:0.86rem}
.modal-footer{padding:1rem 2.5rem 2rem;border-top:1px solid var(--grey-700)}
/* COMPARISON */
.comparison-wrap{margin:0 3rem 4rem;overflow-x:auto}
.comparison-table{width:100%;border-collapse:collapse;border:1px solid var(--grey-700)}
.comparison-table th{background:var(--offblack);padding:1rem 1.2rem;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--grey-300);text-align:left;border-bottom:1px solid var(--grey-700);border-right:1px solid var(--grey-700)}
.comparison-table th:first-child{width:36%}
.comparison-table td{padding:0.8rem 1.2rem;font-size:0.8rem;color:var(--grey-300);border-bottom:1px solid rgba(255,255,255,0.04);border-right:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.comparison-table tr:last-child td{border-bottom:none}
.comparison-table td:first-child{color:var(--grey-400,#a0a09c);font-size:0.78rem}
.check{color:var(--accent);text-align:center}
.check-cta{color:var(--cta);text-align:center;font-weight:500}
.dash{color:var(--grey-700);text-align:center}
.cat-row td{background:rgba(255,255,255,0.025)!important;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--grey-500)!important;padding:0.55rem 1.2rem!important}
.featured-col{background:rgba(12,148,216,0.05)!important;border-right:1px solid rgba(12,148,216,0.18)!important}
@media(max-width:900px){
  .plans-grid{grid-template-columns:1fr;margin:2rem 1.5rem}
  .pricing-hero{padding:3rem 1.5rem}
  .comparison-wrap{margin:0 1.5rem 3rem}
  .modal-body,.modal-header,.modal-footer{padding-left:1.5rem;padding-right:1.5rem}
}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--offblack);border:1px solid var(--grey-700);padding:1.2rem 1.8rem;z-index:500;font-size:0.84rem;color:var(--white);animation:fadeUp 0.3s both;max-width:360px;line-height:1.5}
.toast.success{border-color:var(--accent)}
.toast.error{border-color:#e07070}

/* LANG NOTICE */
.lang-notice{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--offblack);border:1px solid var(--accent);padding:1rem 2rem;z-index:400;font-size:0.82rem;display:flex;align-items:center;gap:1.5rem;animation:fadeUp 0.4s both;white-space:nowrap}
.lang-notice button{background:var(--accent);color:var(--black);border:none;padding:0.4rem 1rem;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;cursor:pointer}
.lang-notice-close{background:none;border:none;color:var(--grey-500);font-size:0.9rem;cursor:pointer;padding:0}

/* SME PAGE */
.sme-hero{min-height:88vh;display:flex;flex-direction:column;justify-content:flex-end;padding:8rem 3rem 5rem;position:relative;overflow:hidden;background:var(--black)}
.sme-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 65% 65% at 72% 38%,rgba(200,184,154,0.08) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 18% 82%,rgba(200,184,154,0.04) 0%,transparent 60%)}
.sme-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:80px 80px}
.sme-hero-label{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--accent);margin-bottom:2rem;animation:fadeUp 0.8s 0.3s both}
.sme-hero-h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,7vw,7.5rem);font-weight:900;line-height:0.95;letter-spacing:-0.025em;max-width:900px;animation:fadeUp 0.9s 0.5s both}
.sme-hero-h1 .accent{color:var(--accent)}
.sme-hero-h1 .italic{font-style:italic;color:var(--accent)}
.sme-hero-sub{margin-top:2.5rem;font-size:1rem;color:var(--grey-300);max-width:540px;line-height:1.8;animation:fadeUp 0.9s 0.7s both}
.sme-hero-actions{margin-top:3rem;display:flex;gap:1.2rem;align-items:center;flex-wrap:wrap;animation:fadeUp 0.9s 0.9s both}

.sme-philosophy{padding:6rem 3rem;background:var(--offblack);border-top:var(--rule);border-bottom:var(--rule)}
.sme-philosophy-inner{max-width:820px;margin:0 auto;text-align:center}
.sme-philosophy-quote{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2.2rem);font-style:italic;line-height:1.45;color:var(--white);margin:2rem 0}
.sme-philosophy-line{width:48px;height:2px;background:var(--accent);margin:0 auto 1.5rem}
.sme-philosophy-sub{font-size:0.92rem;color:var(--grey-300);line-height:1.85;max-width:680px;margin:0 auto}

.sme-services-section{padding:7rem 3rem;background:var(--black)}
.sme-services-header{margin-bottom:4rem}
.sme-services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--grey-700);border:1px solid var(--grey-700)}
.sme-service-card{background:var(--black);padding:2.5rem;position:relative;overflow:hidden;transition:background 0.3s}
.sme-service-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--accent);transition:width 0.4s}
.sme-service-card:hover{background:#131311}
.sme-service-card:hover::before{width:100%}
.sme-service-num{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--grey-500);letter-spacing:0.15em;margin-bottom:1.5rem}
.sme-service-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:600;margin-bottom:0.8rem;line-height:1.2}
.sme-service-desc{color:var(--grey-300);font-size:0.85rem;line-height:1.8;margin-bottom:1.2rem}
.sme-service-tag{font-family:'DM Mono',monospace;font-size:0.64rem;letter-spacing:0.08em;color:var(--accent);padding:0.3rem 0.7rem;border:1px solid rgba(200,184,154,0.3);display:inline-block}

.sme-insights-section{padding:7rem 3rem;background:var(--offblack);border-top:var(--rule)}
.sme-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);border-top:var(--rule);border-bottom:var(--rule);margin:3rem 0}
.sme-stat-item{padding:2.5rem 2rem;border-right:var(--rule);text-align:center}
.sme-stat-item:last-child{border-right:none}
.sme-stat-num{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;line-height:1;letter-spacing:-0.03em}
.sme-stat-label{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey-500);margin-top:0.5rem;font-weight:400;line-height:1.5}

.sme-markets-label{font-family:'DM Mono',monospace;font-size:0.64rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:2rem;display:flex;align-items:center;gap:1rem}
.sme-markets-label::after{content:'';height:1px;width:40px;background:var(--accent);opacity:0.5}
.sme-market-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:1rem}
.sme-market-card{border:1px solid var(--grey-700);padding:2rem;position:relative;overflow:hidden;transition:border-color 0.3s}
.sme-market-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);transform:scaleX(0);transform-origin:left;transition:transform 0.4s}
.sme-market-card:hover{border-color:var(--grey-500)}
.sme-market-card:hover::after{transform:scaleX(1)}
.sme-market-flag{font-size:2rem;margin-bottom:0.8rem}
.sme-market-country{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;margin-bottom:0.3rem}
.sme-market-stat{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--accent);letter-spacing:0.06em;margin-bottom:0.8rem}
.sme-market-insight{font-size:0.82rem;color:var(--grey-300);line-height:1.7}

.sme-difference-section{padding:7rem 3rem;background:var(--black);border-top:var(--rule)}
.sme-difference-inner{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:start}
.sme-difference-text p{color:var(--grey-300);font-size:0.92rem;line-height:1.85;margin-top:1.2rem}
.sme-difference-text p:first-child{margin-top:0}
.sme-pillars-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.sme-pillar-card{border:1px solid var(--grey-700);padding:1.8rem;position:relative;overflow:hidden;transition:border-color 0.3s}
.sme-pillar-card::before{content:'';position:absolute;top:0;left:0;width:0;height:2px;background:var(--accent);transition:width 0.4s}
.sme-pillar-card:hover{border-color:var(--grey-500)}
.sme-pillar-card:hover::before{width:100%}
.sme-pillar-icon{font-size:1.4rem;margin-bottom:0.8rem}
.sme-pillar-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;margin-bottom:0.5rem}
.sme-pillar-desc{font-size:0.8rem;color:var(--grey-300);line-height:1.7}

.sme-cta-section{padding:7rem 3rem;background:var(--offblack);border-top:var(--rule);text-align:center}
.sme-cta-inner{max-width:680px;margin:0 auto}
.sme-cta-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:900;line-height:1.1;letter-spacing:-0.02em;margin-bottom:1.5rem}
.sme-cta-sub{font-size:0.95rem;color:var(--grey-300);line-height:1.8;margin-bottom:2.5rem;max-width:520px;margin-left:auto;margin-right:auto}
.sme-cta-actions{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap}

@media(max-width:900px){
  .sme-hero{padding:7rem 1.5rem 4rem}
  .sme-services-grid{grid-template-columns:1fr}
  .sme-stat-grid{grid-template-columns:repeat(2,1fr)}
  .sme-stat-item:nth-child(2){border-right:none}
  .sme-market-grid{grid-template-columns:1fr 1fr}
  .sme-difference-inner{grid-template-columns:1fr;gap:3rem}
  .sme-pillars-grid{grid-template-columns:1fr 1fr}
  .sme-philosophy,.sme-services-section,.sme-insights-section,.sme-difference-section,.sme-cta-section{padding:5rem 1.5rem}
}
@media(max-width:600px){
  .sme-market-grid{grid-template-columns:1fr}
  .sme-pillars-grid{grid-template-columns:1fr}
  .sme-stat-grid{grid-template-columns:1fr 1fr}
}

/* INSIGHTS PAGE */
.ins-hero{min-height:72vh;display:flex;flex-direction:column;justify-content:flex-end;padding:8rem 3rem 5rem;position:relative;overflow:hidden;background:var(--black)}
.ins-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 80% 30%,rgba(12,148,216,0.06) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 15% 85%,rgba(12,148,216,0.03) 0%,transparent 60%)}
.ins-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:80px 80px}
.ins-hero-label{font-family:'DM Mono',monospace;font-size:0.66rem;letter-spacing:0.26em;text-transform:uppercase;color:var(--cta);margin-bottom:1.8rem;animation:fadeUp 0.8s 0.3s both}
.ins-hero-h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,8vw,8rem);font-weight:900;line-height:0.92;letter-spacing:-0.03em;max-width:800px;animation:fadeUp 0.9s 0.5s both}
.ins-hero-h1 em{font-style:italic;color:var(--cta)}
.ins-hero-sub{margin-top:2.5rem;font-size:1rem;color:var(--grey-300);max-width:560px;line-height:1.82;animation:fadeUp 0.9s 0.7s both}
.ins-hero-meta{margin-top:2.5rem;display:flex;gap:2.5rem;flex-wrap:wrap;animation:fadeUp 0.9s 0.9s both}
.ins-hero-meta-item{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;color:var(--grey-500);text-transform:uppercase;display:flex;align-items:center;gap:0.5rem}
.ins-hero-meta-item span{color:var(--cta);font-size:1.1rem;font-weight:600;font-family:'Playfair Display',serif;letter-spacing:0}
/* Live KPI strip */
.ins-kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid rgba(12,148,216,0.2);border-bottom:1px solid rgba(12,148,216,0.2);background:rgba(12,148,216,0.03)}
.ins-kpi{padding:2rem 2rem;border-right:var(--rule);display:flex;flex-direction:column;gap:0.35rem;position:relative}
.ins-kpi:last-child{border-right:none}
.ins-kpi-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--white);line-height:1}
.ins-kpi-lbl{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--grey-500)}
.ins-kpi-live{position:absolute;top:1rem;right:1rem;width:6px;height:6px;border-radius:50%;background:var(--cta);animation:livePulse 2s infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(12,148,216,0.4)}50%{opacity:0.7;box-shadow:0 0 0 6px rgba(12,148,216,0)}}
/* Explorer section */
.ins-explorer{padding:5rem 3rem;background:var(--offblack);border-top:var(--rule)}
.ins-explorer-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2.5rem;gap:2rem;flex-wrap:wrap}
.ins-filters{display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:2.5rem}
.ins-filter-btn{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.55rem 1.1rem;border:1px solid var(--grey-700);background:none;color:var(--grey-400);cursor:pointer;transition:all 0.2s}
.ins-filter-btn:hover{border-color:var(--grey-400);color:var(--white)}
.ins-filter-btn.active{border-color:var(--cta);color:var(--cta);background:rgba(12,148,216,0.08)}
.ins-filter-select{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;padding:0.55rem 1rem;border:1px solid var(--grey-700);background:var(--grey-800);color:var(--grey-300);cursor:pointer;outline:none}
.ins-filter-select:focus{border-color:var(--cta)}
.ins-filter-select option{background:#1a1a18}
.ins-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:2rem}
.ins-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2rem;margin-bottom:2rem}
.ins-chart-card{border:1px solid var(--grey-700);padding:1.8rem;background:var(--black)}
.ins-chart-title{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey-500);margin-bottom:1.5rem;display:flex;align-items:center;gap:0.7rem}
.ins-chart-title::before{content:'';display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--cta);flex-shrink:0}
.ins-bar-row{display:flex;align-items:center;gap:0.9rem;margin-bottom:0.85rem}
.ins-bar-label{font-size:0.75rem;color:var(--grey-300);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:0 0 130px}
.ins-bar-track{flex:1;height:6px;background:var(--grey-700);overflow:hidden;border-radius:0}
.ins-bar-fill{height:100%;background:var(--cta);transition:width 0.8s ease;border-radius:0}
.ins-bar-fill.green{background:#16a34a}
.ins-bar-fill.amber{background:#d97706}
.ins-bar-fill.red{background:#e07070}
.ins-bar-pct{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--grey-500);flex-shrink:0;min-width:32px;text-align:right}
.ins-score-dist{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grey-700)}
.ins-score-band{padding:1.4rem 1rem;background:var(--black);display:flex;flex-direction:column;gap:0.4rem;text-align:center}
.ins-score-band-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;line-height:1}
.ins-score-band-label{font-family:'DM Mono',monospace;font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--grey-500)}
.ins-score-band-range{font-family:'DM Mono',monospace;font-size:0.58rem;color:var(--grey-700);margin-top:0.2rem}
.ins-trend-row{display:flex;align-items:flex-end;gap:4px;height:64px;margin-top:1rem}
.ins-trend-bar{flex:1;background:rgba(12,148,216,0.25);transition:height 0.6s ease;position:relative;cursor:default}
.ins-trend-bar:hover{background:var(--cta)}
.ins-trend-bar-tip{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--cta);white-space:nowrap;display:none}
.ins-trend-bar:hover .ins-trend-bar-tip{display:block}
.ins-trend-months{display:flex;gap:4px;margin-top:0.4rem}
.ins-trend-month{flex:1;font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--grey-700);text-align:center;overflow:hidden;text-overflow:clip}
.ins-empty{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--grey-700);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;border:1px dashed var(--grey-700)}
/* Market section */
.ins-markets{padding:5rem 3rem;background:var(--black);border-top:var(--rule)}
.ins-market-tabs{display:flex;gap:0;border-bottom:1px solid var(--grey-700);margin-bottom:3rem;flex-wrap:wrap}
.ins-market-tab{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.8rem 1.5rem;border:none;background:none;color:var(--grey-500);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;margin-bottom:-1px}
.ins-market-tab:hover{color:var(--grey-300)}
.ins-market-tab.active{color:var(--cta);border-bottom-color:var(--cta)}
.ins-market-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.ins-market-card{border:1px solid var(--grey-700);padding:2rem;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.2s;cursor:pointer}
.ins-market-card:hover{border-color:rgba(12,148,216,0.5);transform:translateY(-2px)}
.ins-market-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cta),transparent);transform:scaleX(0);transform-origin:left;transition:transform 0.35s}
.ins-market-card:hover::after{transform:scaleX(1)}
.ins-market-flag{font-size:2.2rem;margin-bottom:0.8rem;display:block}
.ins-market-country{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:0.2rem}
.ins-market-region{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;color:var(--cta);text-transform:uppercase;margin-bottom:0.7rem}
.ins-market-stat{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--grey-500);letter-spacing:0.04em;margin-bottom:0.8rem}
.ins-market-insight{font-size:0.82rem;color:var(--grey-300);line-height:1.72;margin-bottom:1rem}
.ins-market-tags{display:flex;flex-wrap:wrap;gap:0.4rem}
.ins-market-tag{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.06em;padding:0.2rem 0.55rem;border:1px solid var(--grey-700);color:var(--grey-500)}
.ins-market-opp{background:rgba(12,148,216,0.06);border-top:1px solid var(--grey-700);margin:1rem -2rem -2rem;padding:1rem 2rem;font-size:0.78rem;color:var(--grey-400);line-height:1.55;display:flex;gap:0.6rem;align-items:flex-start}
.ins-market-opp::before{content:'→';color:var(--cta);flex-shrink:0;font-size:0.7rem;margin-top:2px}
/* Investor section */
.ins-investor{padding:5rem 3rem;background:var(--offblack);border-top:var(--rule)}
.ins-investor-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;margin-top:3rem}
.ins-investor-card{border:1px solid var(--grey-700);padding:2rem;border-left:3px solid var(--cta)}
.ins-investor-card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;margin-bottom:0.4rem}
.ins-investor-card-sub{font-size:0.78rem;color:var(--grey-500);font-family:'DM Mono',monospace;margin-bottom:1.2rem}
.ins-investor-metrics{display:flex;flex-direction:column;gap:0.6rem}
.ins-investor-metric{display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--grey-700)}
.ins-investor-metric:last-child{border-bottom:none}
.ins-investor-metric-label{font-size:0.8rem;color:var(--grey-300)}
.ins-investor-metric-val{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--cta)}
/* Responsive */
@media(max-width:900px){
  .ins-hero{padding:7rem 1.5rem 4rem}
  .ins-kpi-strip{grid-template-columns:repeat(2,1fr)}
  .ins-kpi:nth-child(2){border-right:none}
  .ins-explorer,.ins-markets,.ins-investor{padding:4rem 1.5rem}
  .ins-grid-2,.ins-grid-3{grid-template-columns:1fr}
  .ins-market-grid{grid-template-columns:1fr 1fr}
  .ins-investor-grid{grid-template-columns:1fr;gap:2rem}
  .ins-score-dist{grid-template-columns:repeat(2,1fr)}
  .ins-bar-label{flex:0 0 100px}
}
@media(max-width:600px){
  .ins-market-grid{grid-template-columns:1fr}
  .ins-kpi-strip{grid-template-columns:1fr 1fr}
  .ins-kpi:nth-child(even){border-right:none}
}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes scrollPulse{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.reveal{opacity:0;transform:translateY(28px);transition:opacity 0.7s,transform 0.7s}
.reveal.visible{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:900px){
  .nav{padding:1rem 1.2rem}
  .nav-links{display:none}
  .nav-hamburger{display:flex}
  .lang-switcher{display:none}
  .section{padding:5rem 1.5rem}
  .hero{padding:7rem 1.5rem 4rem}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .stat-item{padding:1.8rem 1.5rem}
  .about-grid{grid-template-columns:1fr}
  .about-visual{display:none}
  .services-grid{grid-template-columns:1fr}
  .services-header{flex-direction:column;align-items:flex-start}
  .cases-grid{grid-template-columns:1fr}
  .testimonial-bar{grid-template-columns:1fr;gap:2rem}
  .testimonial-attr{text-align:left}
  .contact-grid{grid-template-columns:1fr}
  .contact-left,.contact-right{padding:4rem 1.5rem}
  .report-body{grid-template-columns:1fr;padding:1.5rem}
  .report-hero{padding:2.5rem 1.5rem}
  .report-sidebar{position:static}
  .footer{flex-direction:column;text-align:center;padding:2rem 1.5rem}
  .lang-notice{white-space:normal;left:1rem;right:1rem;transform:none;flex-wrap:wrap;justify-content:center}
  .diag-stats-row{display:none}
  .proc-progress-wrap{width:90vw}
  .processing-steps{max-width:90vw}
  .form-panel{padding:1.5rem}
}

<script type="text/babel">

const API_BASE = window.VERTEX_API_BASE || 'http://localhost:5000';
const CONTACT_EMAIL = "info@vertexgroup.africa";
const SITE_DOMAIN = "vertexgroup.africa";

async function apiPost(path, body, isFormData = false) {
  const opts = {
    method: 'POST',
    headers: isFormData ? {} : { 'Content-Type': 'application/json' },
    body: isFormData ? body : JSON.stringify(body),
  };
  const res = await fetch(`${API_BASE}${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'Request failed');
  return data;
}

// Translations: see window.__T__ (loaded in plain script)
const T = window.__T__;


// ── FRENCH-SPEAKING AFRICAN COUNTRIES ───────────────────────────
const FRENCH_COUNTRIES = ['CD','CG','CM','CI','BJ','BF','GA','GN','ML','MR','NE','RW','SN','TG','TN','MG','BI','KM','DJ','CF','GQ','TD','SC','ST','MU'];
const ENGLISH_COUNTRIES = ['ZA','NG','KE','GH','TZ','UG','ZM','ZW','MW','NA','BW','SZ','LS','SL','LR','GM','ET','RW','SS','SD','ER','SO'];

// ── GEO DETECTION ─────────────────────────────────────────────────
async function detectLanguage() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    const cc = d.country_code;
    if (FRENCH_COUNTRIES.includes(cc)) return { lang: 'fr', country: d.country_name };
    return { lang: 'en', country: d.country_name };
  } catch {
    return { lang: 'en', country: null };
  }
}

async function sendEmail(_params) {
  await new Promise(r => setTimeout(r, 800));
  return { status: 200 };
}

// ── UTILS ─────────────────────────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 6000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{msg}</div>;
}

function timeStr(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

async function readFileAsBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

    if (!form.name || !form.email || !form.company) { setToast({ msg: t.quote_required, type:'error' }); return; }

    const featuresText = plan.features.join('\n• ');

QUOTE REQUEST — ${plan.name.toUpperCase()} PLAN
${'─'.repeat(50)}
Plan: ${plan.name}
Duration: ${plan.duration}
Price: ${plan.price}

PLAN INCLUDES:
• ${featuresText}

${'─'.repeat(50)}
APPLICANT DETAILS:
Name: ${form.name}
Email: ${form.email}
Company: ${form.company}
Country: ${form.country || 'Not specified'}
Company Size: ${form.size || 'Not specified'}
Revenue Range: ${form.revenue || 'Not specified'}

ADDITIONAL CONTEXT:
${form.message || 'None provided'}
${'─'.repeat(50)}
Submitted via vertexgroup.africa
    `.trim();
    try {
      await apiPost('/api/leads/quote', {
        name: form.name,
        email: form.email,
        company: form.company,
        country: form.country,
        phone: form.phone,
        plan: plan.name,
        companySize: form.size,
        revenue: form.revenue,
        message: form.message,
        language: isFr ? 'fr' : 'en',
      });
      setSent(true);
      setToast({ msg: t.quote_success, type:'success' });
    } catch {
      setToast({ msg: t.quote_error, type:'error' });
    } finally { setSending(false); }
  };

  const ff = (k,v) => setForm(f => ({...f,[k]:v}));
  const sizes = isFr
    ? ['1–10 employés','11–50 employés','51–200 employés','201–500 employés','500+ employés']
    : ['1–10 employees','11–50 employees','51–200 employees','201–500 employees','500+ employees'];
  const revenues = ['Under R1M / $50K','R1M–R5M / $50K–$250K','R5M–R20M / $250K–$1M','R20M–R100M / $1M–$5M','Over R100M / $5M+'];

  return (
    <div className="modal-overlay" onClick={handleBackdrop}>

            </div>)}
            {plan.features.length > 5 && <div style={{color:'var(--grey-500)',fontSize:'0.75rem',marginTop:'0.5rem',fontFamily:'DM Mono,monospace'}}>+{plan.features.length - 5} {isFr?'inclus':'more included'}</div>}

// ── DIAGNOSIS PAGE ────────────────────────────────────────────────
function DiagnosisPage({ setPage, setReport, t }) {
  useReveal();
  const [form, setForm] = useState({company:'',name:'',email:'',country:'',industry:'',size:'',challenge:'',goals:'',revenue:''});
  const [file, setFile] = useState(null);
  const [errors, setErrors] = useState({});
  const [processing, setProcessing] = useState(false);
  const [procStep, setProcStep] = useState(0);
  const [timer, setTimer] = useState(0);
  const [drag, setDrag] = useState(false);
  const [toast, setToast] = useState(null);
  const isFr = t === T.fr;

  const industries = isFr
    ? ['Technologie & Numérique','Commerce de détail','Services financiers','Santé','Agriculture & Alimentation','Industrie','Services professionnels','Éducation','Logistique','Autre']
    : ['Technology & Digital','Retail & Consumer','Financial Services','Healthcare','Agriculture & Food','Manufacturing','Professional Services','Education','Logistics & Supply Chain','Other'];
  const sizes = isFr
    ? ['1–10 employés','11–50 employés','51–200 employés','201–500 employés','500+ employés']
    : ['1–10 employees','11–50 employees','51–200 employees','201–500 employees','500+ employees'];
  const revenues = ['Under R1M / $50K','R1M–R5M / $50K–$250K','R5M–R20M / $250K–$1M','R20M–R100M / $1M–$5M','Over R100M / $5M+'];
  const countries = ['Algeria','Angola','Benin','Botswana','Burkina Faso','Burundi','Cabo Verde','Cameroon','Central African Republic','Chad','Comoros','Congo (Brazzaville)','Congo (DRC)',"Côte d'Ivoire",'Djibouti','Egypt','Equatorial Guinea','Eritrea','Eswatini','Ethiopia','Gabon','Gambia','Ghana','Guinea','Guinea-Bissau','Kenya','Lesotho','Liberia','Libya','Madagascar','Malawi','Mali','Mauritania','Mauritius','Morocco','Mozambique','Namibia','Niger','Nigeria','Rwanda','São Tomé & Príncipe','Senegal','Seychelles','Sierra Leone','Somalia','South Africa','South Sudan','Sudan','Tanzania','Togo','Tunisia','Uganda','Zambia','Zimbabwe','Other (outside Africa)'];

  const validate = () => {
    const e = {};
    if (!form.company) e.company = '*';
    if (!form.name) e.name = '*';
    if (!form.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = t.form_email_invalid;
    if (!form.country) e.country = '*';
    if (!form.industry) e.industry = '*';
    if (!form.challenge) e.challenge = '*';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const runDiagnosis = async () => {
    if (!validate()) { setToast({msg:t.form_required,type:'error'}); return; }
    setProcessing(true); setProcStep(0); setTimer(0);

    // ── 1. Submit the form IMMEDIATELY — don't wait for animation ────────────
    const fd = new FormData();
    fd.append('name',      form.name);
    fd.append('email',     form.email);
    fd.append('company',   form.company);
    fd.append('country',   form.country || '');
    fd.append('industry',  form.industry);
    fd.append('challenge', form.challenge);
    fd.append('employees', form.size    || '');
    fd.append('revenue',   form.revenue || '');
    fd.append('language',  isFr ? 'fr' : 'en');
    if (file) fd.append('files', file);

    let diagnosticId = null;
    try {
      const submitRes = await apiPost('/api/diagnostics', fd, true);
      diagnosticId = submitRes.diagnosticId;
    } catch (err) {
      setProcessing(false);
      setToast({ msg: isFr
        ? `Erreur de soumission : ${err.message || 'Vérifiez votre connexion et réessayez.'}`
        : `Submission error: ${err.message || 'Check your connection and try again.'}`,
        type: 'error' });
      return;
    }

    // ── 2. Run animation in parallel while AI works ───────────────────────────
    let elapsed = 0;
    const ti = setInterval(() => { elapsed++; setTimer(elapsed); }, 1000);

    const animateSteps = async () => {
      for (let i = 0; i < t.proc_steps.length; i++) {
        await new Promise(r => setTimeout(r, i === 0 ? 600 : 1800));
        setProcStep(i + 1);
      }
    };
    animateSteps(); // fire and forget — runs alongside polling

    // ── 3. Poll until completed — up to 4 minutes (48 × 5 s) ─────────────────
    let diagData = null;
    for (let attempt = 0; attempt < 48; attempt++) {
      await new Promise(r => setTimeout(r, 5000));
      try {
        const poll = await apiGet(`/api/diagnostics/${diagnosticId}/result`);
        if (poll.status === 'completed' && poll.result) {
          const r = poll.result;
          diagData = {
            overall_score:         r.overallScore,
            score_label:           r.scoreLabel,
            executive_summary:     r.executiveSummary,
            growth_potential:      r.growthPotential,
            vertex_recommendation: r.vertexRecommendation,
            dimensions:            r.dimensions || [],
            top_priorities:        (r.dimensions || [])
              .filter(d => d.severity === 'Critical')
              .map(d => d.recommendations?.[0])
              .filter(Boolean)
              .slice(0, 3),
          };
          break;
        }
        if (poll.status === 'failed') {
          // AI failed — still show report page with what we have
          break;
        }
      } catch (_) {
        // network blip — keep polling
      }
    }

    // ── 4. If AI timed out or failed, show confirmation result ────────────────
    if (!diagData) {
      diagData = {
        overall_score: null,
        score_label:   isFr ? 'En cours' : 'Processing',
        executive_summary: isFr
          ? `Votre analyse pour ${form.company} est en cours de finalisation par Vertex AI. Vous recevrez votre rapport complet par email sous 60 minutes. Notre équipe est disponible si vous souhaitez en discuter.`
          : `Your analysis for ${form.company} is being finalised by Vertex AI. You will receive your full report by email within 60 minutes. Our team is available if you would like to discuss it sooner.`,
        dimensions: [], top_priorities: [], growth_potential: '', vertex_recommendation: '',
      };
    }

    clearInterval(ti);
    setProcessing(false);
    setReport({ ...diagData, company: form.company, email: form.email, name: form.name, industry: form.industry, timestamp: new Date(), lang: isFr ? 'fr' : 'en' });
    setPage('report');
    window.scrollTo(0, 0);
  };

  const ff = (k,v) => setForm(f => ({...f,[k]:v}));

  return (
    <div style={{paddingTop:80}}>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)}/>}

      {processing && (
        <div className="processing-overlay">
          {/* Vertex brand mark */}
          <div className="processing-logo">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M2 4L11 18L20 4" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              <path d="M6 4L11 12L16 4" stroke="#0c94d8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            <span className="processing-logo-text">Vertex Group Africa</span>
          </div>
          <div className="processing-ring"/>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:'DM Mono,monospace',fontSize:'0.6rem',letterSpacing:'0.22em',color:'var(--cta)',marginBottom:'0.75rem'}}>{t.proc_label}</div>
            <div className="processing-title">{t.proc_title}</div>
          </div>
          <div className="processing-timer">{timeStr(timer)}</div>
          <div className="processing-steps">
            {t.proc_steps.map((s,i) => (
              <div key={i} className={`proc-step ${procStep>i?'done':procStep===i?'active':''}`}>
                <div className="proc-step-dot"/>
                <span>{procStep>i ? '✓ ' : ''}{s}</span>
              </div>
            ))}
          </div>
          <div className="proc-progress-wrap">
            <div className="proc-progress-fill" style={{width:`${Math.min(100,Math.round((procStep/t.proc_steps.length)*100))}%`}}/>
          </div>
          <p style={{color:'var(--grey-500)',fontSize:'0.8rem',textAlign:'center',maxWidth:380,lineHeight:1.65,fontFamily:'DM Mono,monospace'}}>{t.proc_sub}</p>
        </div>
      )}

      {/* Hero */}
      <div style={{padding:'5rem 3rem 4rem',borderBottom:'var(--rule)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5rem',alignItems:'center'}}>
        <div>
          <div className="section-label" style={{color:'var(--cta)'}}>{t.diag_label}</div>
          <h1 className="section-title" style={{maxWidth:500}}>{t.diag_title.split('.')[0]}.<br/><em style={{fontStyle:'italic',color:'var(--cta)'}}>{t.diag_title.split('.')[1]?.trim()}</em></h1>
          <p style={{color:'var(--grey-300)',marginTop:'1.5rem',fontSize:'0.93rem',lineHeight:1.82,maxWidth:440}}>{t.diag_sub}</p>

            <span style={{padding:'0.5rem 1.1rem',fontSize:'0.67rem',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',fontFamily:'DM Mono,monospace',background:'var(--cta)',color:'var(--white)'}}>{t.badge_free}</span>
            <span style={{padding:'0.5rem 1.1rem',fontSize:'0.67rem',letterSpacing:'0.1em',textTransform:'uppercase',fontFamily:'DM Mono,monospace',border:'1px solid var(--grey-700)',color:'var(--grey-300)'}}>{t.badge_pro}</span>

          <div className="diag-stats-row">

// ── NEWSLETTER SECTION ────────────────────────────────────────────
function NewsletterSection({ t }) {
  const [email, setEmail] = useState('');
  const [name, setName] = useState('');
  const [subscribed, setSubscribed] = useState(false);
  const [loading, setLoading] = useState(false);

  const handleSubscribe = async () => {
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;
    setLoading(true);
    try {
      await apiPost('/api/newsletter/subscribe', {
        email,
        name,
        language: window.__VERTEX_LANG__ || 'en',
      });
    } catch { /* silent — UI still shows success */ }
    setLoading(false);
    setSubscribed(true);
  };

  return (
    <div className="newsletter-section">
      <div className="newsletter-left">
        <div className="section-label">{t.newsletter_label}</div>
        <h2 className="newsletter-title">{t.newsletter_title}</h2>
        <p className="newsletter-sub">{t.newsletter_sub}</p>
        <div className="newsletter-topics">
          <span style={{fontSize:'0.68rem',color:'var(--grey-500)',fontFamily:'DM Mono,monospace',letterSpacing:'0.1em',textTransform:'uppercase',marginRight:'0.3rem'}}>{t.newsletter_topics_label}</span>
          {t.newsletter_topics.map(tp => <span key={tp} className="newsletter-topic">{tp}</span>)}
        </div>
      </div>
      <div className="newsletter-right">
        {subscribed ? (
          <div className="newsletter-success">
            <span className="newsletter-success-icon">✦</span>
            <span>{t.newsletter_success}</span>
          </div>
        ) : (
          <div className="newsletter-form">
            <div className="newsletter-input-row">
              <input
                className="newsletter-input"
                type="text"
                placeholder={t.newsletter_name_placeholder}
                value={name}
                onChange={e => setName(e.target.value)}
                style={{borderRight:'1px solid var(--grey-700)',marginBottom:0,borderBottom:'none'}}
              />
            </div>
            <div className="newsletter-input-row">
              <input
                className="newsletter-input"
                type="email"
                placeholder={t.newsletter_placeholder}
                value={email}
                onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleSubscribe()}
              />
              <button className="newsletter-btn" onClick={handleSubscribe} disabled={loading||!email}>
                {loading ? '...' : t.newsletter_btn}
              </button>
            </div>
            <div className="newsletter-disclaimer">{t.newsletter_disclaimer}</div>
          </div>
        )}
        {/* Social links */}
        <div style={{marginTop:'2.5rem'}}>
          <div style={{fontFamily:'DM Mono,monospace',fontSize:'0.62rem',letterSpacing:'0.2em',color:'var(--grey-500)',textTransform:'uppercase',marginBottom:'1rem'}}>{t.social_label}</div>
          <div className="social-row">
            <a href="https://www.instagram.com/vertexgroup.africa" target="_blank" rel="noopener noreferrer" className="social-btn">
              <IconInstagram/> {t.social_instagram}
            </a>
            <a href="https://www.linkedin.com/company/vertexgroup-africa" target="_blank" rel="noopener noreferrer" className="social-btn">
              <IconLinkedIn/> {t.social_linkedin}
            </a>
          </div>
          <div style={{marginTop:'0.8rem',fontSize:'0.68rem',color:'var(--grey-500)',fontFamily:'DM Mono,monospace',letterSpacing:'0.06em'}}>{t.social_follow}</div>
        </div>
      </div>
    </div>
  );
}
