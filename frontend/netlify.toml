[build]
  publish = "."

[build.processing]
  skip_processing = true

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/forms/*"
  to = "/form.html"
  status = 200

[[redirects]]
  from = "/events"
  to = "/events.html"
  status = 200

[[redirects]]
  from = "/incubator"
  to = "/incubator/index.html"
  status = 200

# Subdomain redirect: incubator.vertexgroup.africa → incubator page
[[redirects]]
  from = "https://incubator.vertexgroup.africa/*"
  to = "/incubator/index.html"
  status = 200
  force = true
